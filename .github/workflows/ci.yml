# CI — runs on every push and pull request.
# Keeps the two "after every change" rules honest even when nobody remembers:
# typecheck must be clean, tests must be green. Uses `npm ci` (never bare
# `npm install`) per CLAUDE.md hard rule 5 — the lockfile is the law.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo. Explicit, so a future
# change to the repo-level default can never silently widen what CI can do.
permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install exact dependencies from lockfile
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (interlock + fee math + helpers)
        run: npm test

      - name: Install Solana CLI (Agave) for localnet integration tests
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Start a throwaway local validator
        run: |
          solana-test-validator --reset --quiet &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8899 -X POST -H "content-type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth"}' | grep -q '"ok"'; then
              echo "validator healthy"; exit 0
            fi
            sleep 2
          done
          echo "validator failed to start"; exit 1

      # The real scripts 01→05, end to end, against the throwaway chain —
      # skips gracefully when no validator is present (e.g. local Windows runs)
      - name: Integration tests (full lifecycle on localnet)
        run: npm run test:integration

      # Report-only: the known transitive advisories in the official Solana
      # 1.x stack are triaged in docs/SECURITY-CHECKLIST.md §8 and must not
      # block CI. A NEW advisory shows up here — read the log on every run.
      - name: Dependency audit (report-only, see SECURITY-CHECKLIST §8)
        run: npm run audit
        continue-on-error: true
